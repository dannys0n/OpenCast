services:
  qwen3-tts-gpu:
    environment:
      - TTS_BACKEND=official
      - TTS_MODEL_NAME=Qwen/Qwen3-TTS-12Hz-0.6B-CustomVoice
      - HF_HOME=/home/appuser/.cache/huggingface
    volumes:
      - /home/danny/Desktop/OpenCast/deployment/.hf-cache:/home/appuser/.cache/huggingface
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ['0']
              capabilities: [gpu]

  qwen3-tts-vllm:
    environment:
      - TTS_BACKEND=vllm_omni
      - TTS_MODEL_NAME=Qwen/Qwen3-TTS-12Hz-0.6B-CustomVoice
      - HF_HOME=/root/.cache/huggingface
    volumes:
      - /home/danny/Desktop/OpenCast/deployment/.hf-cache:/root/.cache/huggingface
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ['0']
              capabilities: [gpu]
